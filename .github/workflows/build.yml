name: Android Build

on:
  workflow_dispatch: 
    inputs: 
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build:
    name: Build
#    needs: static-code-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create keys.properties and keystore
        run: |
          echo "RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}" >> keys.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> keys.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> keys.properties
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks
          echo "KEYSTORE_PATH=release.jks" > keys.properties

      - name: Build with Gradle
        run: ./gradlew clean build -x detekt
